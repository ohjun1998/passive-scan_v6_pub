name: Automated Parallel Passive Reconnaissance (Staged & Optimized Engine)

on:
  workflow_dispatch: # 수동 실행

permissions:
  contents: write

jobs:
  # ==========================================
  # [STAGE 1: 수집 및 선행 다운로드 전담 단계] 중복 트래픽 0% 및 WAF 완벽 우회
  # ==========================================
  collect-urls:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        group: ["00", "01", "02", "03"]
      fail-fast: false
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Create Targets File from Secret
      run: echo "${{ secrets.TARGET_DOMAINS }}" > targets.txt

    - name: Set up Go
      with:
        go-version: 'stable'
      uses: actions/setup-go@v5

    - name: Install Collection Tools
      run: |
        go install github.com/lc/gau/v2/cmd/gau@latest
        go install github.com/tomnomnom/waybackurls@latest
        echo "$HOME/go/bin" >> $GITHUB_PATH

    - name: Grant Execute Permission
      run: chmod +x collect_urls.sh

    - name: Run Stage 1 Passive Collector & Safe Downloader
      run: ./collect_urls.sh ${{ matrix.group }}

    # 수집된 텍스트 로그와 함께 안전하게 다운로드 완료된 원본 실물 JS 자산까지 모두 통째로 암호화 포장
    - name: Encrypt Stage 1 Package
      run: |
        mkdir -p encrypted_stage1
        tar -czf - -C results/ . 2>/dev/null | gpg --symmetric --batch --yes --passphrase "${{ secrets.ACTIONS_CRYPTO_PASSWORD }}" --cipher-algo AES256 --output encrypted_stage1/urls_${{ matrix.group }}.tar.gz.gpg

    - name: Upload Stage 1 Intermediary Data
      uses: actions/upload-artifact@v4
      with:
        name: urls-package-${{ matrix.group }}
        path: encrypted_stage1/urls_${{ matrix.group }}.tar.gz.gpg
        retention-days: 1

  # ==========================================
  # [STAGE 2: 완전 오프라인 고속 분석 전담 단계] 타겟 서버 난타 원천 차단
  # ==========================================
  analyze-js:
    runs-on: ubuntu-latest
    needs: collect-urls
    strategy:
      matrix:
        group: ["00", "01", "02", "03"]
        tool: [linkfinder, trufflehog]
      fail-fast: false
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Create Targets File from Secret
      run: echo "${{ secrets.TARGET_DOMAINS }}" > targets.txt

    - name: Set up Go
      with:
        go-version: 'stable'
      uses: actions/setup-go@v5

    - name: Set up Python
      if: matrix.tool == 'linkfinder'
      with:
        python-version: '3.10'
      uses: actions/setup-python@v5

    - name: Install Assigned Analysis Tool Only
      run: |
        if [ "${{ matrix.tool }}" = "linkfinder" ]; then
          go install github.com/BishopFox/jsluice/cmd/jsluice@latest
          sudo apt-get install jq -y
        elif [ "${{ matrix.tool }}" = "trufflehog" ]; then
          # [WAF 및 504 에러 방지 핵심] 깃허브 최신 태그 API 조회를 생략하고 Go 빌드 시스템을 통해 직접 설치합니다.
          go install github.com/trufflesecurity/trufflehog/v3@latest
        fi
        echo "$HOME/go/bin" >> $GITHUB_PATH

    - name: Download Stage 1 Package
      uses: actions/download-artifact@v4
      with:
        name: urls-package-${{ matrix.group }}
        path: encrypted_storage

    - name: Decrypt Stage 1 Intermediary Data
      run: |
        mkdir -p results
        gpg --decrypt --batch --passphrase "${{ secrets.ACTIONS_CRYPTO_PASSWORD }}" encrypted_storage/urls_${{ matrix.group }}.tar.gz.gpg 2>/dev/null | tar -xzf - -C results/

    - name: Grant Execute Permission
      run: chmod +x scan_${{ matrix.tool }}.sh

    - name: Run Stage 2 Precision Scan (100% Offline Local Scan)
      run: ./scan_${{ matrix.tool }}.sh ${{ matrix.group }}

    # [최적화 핵심] 3단계 엑셀 빌드 시 불필요한 원본 대용량 JS 실물 파일들(*_js_files)은 패키징에서 제외하여 아티팩트 다이어트
    - name: Encrypt Stage 2 Final Package (Excluding Raw JS Sources)
      run: |
        mkdir -p encrypted_final
        tar -czf - -C results/ --exclude='*_js_files' . 2>/dev/null | gpg --symmetric --batch --yes --passphrase "${{ secrets.ACTIONS_CRYPTO_PASSWORD }}" --cipher-algo AES256 --output encrypted_final/analysis_${{ matrix.tool }}_${{ matrix.group }}.tar.gz.gpg

    - name: Upload Encrypted Matrix Results
      uses: actions/upload-artifact@v4
      with:
        name: results-${{ matrix.tool }}--${{ matrix.group }}
        path: encrypted_final/analysis_${{ matrix.tool }}_${{ matrix.group }}.tar.gz.gpg
        retention-days: 1

  # ==========================================
  # [STAGE 3: 통합 마스터 리포트 마감] -> 변동 없음 (보안 호환성 100% 유지)
  # ==========================================
  excel-reporter:
    runs-on: ubuntu-latest
    needs: analyze-js
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: pip install openpyxl requests

    - name: Create Targets File from Secret
      run: echo "${{ secrets.TARGET_DOMAINS }}" > targets.txt

    - name: Download All Encrypted Results
      uses: actions/download-artifact@v4
      with:
        path: encrypted_storage
        merge-multiple: true

    - name: Decrypt and Restore Results
      run: |
        mkdir -p results
        for f in encrypted_storage/*.gpg; do
          if [ -f "$f" ]; then
            echo "[+] Decrypting and merging patch: $f"
            gpg --decrypt --batch --passphrase "${{ secrets.ACTIONS_CRYPTO_PASSWORD }}" "$f" 2>/dev/null | tar -xzf - -C results/
          fi
        done

    - name: Build Intelligent Excel Report
      run: python -u txt_to_excel.py

    - name: Store Final Excel Report in GitHub Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: passive-recon-master-report
        path: reports/passive_recon_report_v1.xlsx
        retention-days: 14

    - name: Alert Discord with Direct Download Link
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: |
        curl -H "Content-Type: application/json" \
             -X POST \
             -d '{"content": "🚀 **[정찰 완료 - 최적화 마스터 보고서]**\n🔒 중복 트래픽 0% 2단계 가속 배관이 완주되었습니다.\n\n👇 **[보고서 다운로드 바로가기]**\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}' \
             $DISCORD_WEBHOOK_URL
